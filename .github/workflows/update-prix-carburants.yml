name: Mise à jour prix carburants

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prix-carburants-update
  cancel-in-progress: false

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Exécuter le script
        run: python scripts/update_prix_carburants_dual.py

      - name: Commit et push si changement
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/prix_carburants.json data/prix_carburants_dual.json

          if git diff --cached --quiet; then
            echo "Aucun changement à commit"
            exit 0
          fi

          git commit -m "Mise à jour automatique des prix carburants"

          for i in 1 2 3; do
            echo "Tentative de push $i"

            git fetch origin "$BRANCH_NAME"
            git rebase "origin/$BRANCH_NAME" || {
              echo "Rebase impossible, abandon"
              exit 1
            }

            if git push origin "HEAD:$BRANCH_NAME"; then
              echo "Push réussi"
              exit 0
            fi

            echo "Push rejeté, nouvelle tentative..."
            sleep 5
          done

          echo "Échec après 3 tentatives"
          exit 1
