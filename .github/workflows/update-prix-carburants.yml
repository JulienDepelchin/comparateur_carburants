name: Update prix carburants

on:
  schedule:
    - cron: '0 6 * * *'   # tous les jours à 6h UTC
  workflow_dispatch:        # déclenchement manuel possible

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas lxml html5lib

      - name: Attente aléatoire (évite la détection bot)
        run: sleep $((RANDOM % 20 + 5))

      - name: Run script (avec retry)
        run: |
          for i in 1 2 3; do
            echo "=== Tentative $i ==="
            python scripts/update_prix_carburants.py && break
            echo "Échec tentative $i, attente 40s..."
            sleep 40
          done

      - name: Commit et push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prix_carburants.json
          git diff --cached --quiet || git commit -m "update: prix carburants $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
